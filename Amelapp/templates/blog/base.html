{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>My Blog</title>
    <link rel="stylesheet" href="{% static 'css/blog.css' %}">
</head>

<body>
    <header>
        <h1><a href="/">My Blog</a></h1>

        {% if user.is_authenticated %}
            <a href="{% url 'post_new' %}">New Post</a>
        {% endif %}
    </header>

    <main>
        {% block content %}
        {% endblock %}
    </main>
</body>
</html>
